# Minimal mask10 recreation of the JEPA champion: DINO + I-JEPA predictor
# with contiguous target blocks at block_scale 0.10.

project:
  name: jepa-mask10
  family: nanopath
  recipe_id: dinov2-vits14-reg-jepa-mask10
  output_dir: /scratch/$USER/nanopath/main-leopard/jepa-mask10
  wandb_dir: /scratch/$USER/nanopath/wandb

data:
  dataset_dir: /scratch/$USER/nanopath/data/tcga_parquet
  split_seed: 42
  val_fraction: 0.05
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  global_crop_scale: [0.4, 1.0]
  local_crop_scale: [0.08, 0.35]
  color_jitter: 0.3
  color_jitter_saturation: 0.25
  hed_jitter: 0.06
  tissue_thresh: 0.0

model:
  type: dinov2_vits14_reg

train:
  seed: 1337
  bf16: true
  activation_checkpointing: false
  batch_size: 128
  num_workers: 16
  prefetch_factor: 2
  persistent_workers: true
  max_train_samples: 1000000
  max_train_flops: 1000000000000000000
  log_every: 100
  save_every: null
  eval_every: 200
  val_batches: 16
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 112
  resume: null

dino:
  lr: 1.0e-4
  lr_min: 1.0e-6
  adam_beta2: 0.999
  warmup_flop_fraction: 0.0909
  freeze_last_layer_fraction: 0.0091
  layerwise_decay: 0.7
  patch_embed_lr_mult: 0.2
  drop_path_rate: 0.1
  head_hidden_dim: 2048
  head_bottleneck_dim: 384
  clip_grad: 3.0
  kde_loss_weight: 0.005
  kde_concentration: 10.0
  jepa_weight: 1.0
  jepa_pred_depth: 4
  jepa_pred_width: 0
  jepa_blocks: 4
  jepa_block_scale: 0.10

probe:
  enabled: true
  model_weights: ema
  count: 1
  datasets:
    - bracs
    - break_his
    - mhist
    - pcam
  segmentation_datasets:
    - pannuke
    - monusac
    - consep
  slide_datasets:
    - ucla_lung
  auc_datasets:
    - surgen
  survival_datasets:
    - leopard_bcr
    - cptac_pda_os
  robustness_datasets:
    - pathorob
  dataset_roots:
    bracs: /scratch/$USER/nanopath/probes/bracs
    break_his: /scratch/$USER/nanopath/probes/break_his
    consep: /scratch/$USER/nanopath/probes/consep
    cptac_pda_os: /scratch/$USER/nanopath/probes/cptac_pda_os
    leopard_bcr: /scratch/$USER/nanopath/probes/leopard_bcr
    mhist: /scratch/$USER/nanopath/probes/mhist
    monusac: /scratch/$USER/nanopath/probes/monusac
    pcam: /scratch/$USER/nanopath/probes/pcam
    pannuke: /scratch/$USER/nanopath/probes/pannuke
    pathorob: /scratch/$USER/nanopath/probes/pathorob
    surgen: /scratch/$USER/nanopath/probes/surgen
    ucla_lung: /scratch/$USER/nanopath/probes/ucla_lung
