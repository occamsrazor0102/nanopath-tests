project:
  name: jf-subexpr-til-g05
  family: nanopath
  recipe_id: dinov2-vits14-reg-jepa-mask10
  output_dir: /data/hm/nanopath/jepafino/jf_subexpr_til_g05
  wandb_dir: /data/$USER/nanopath/wandb
data:
  dataset_dir: /data/nanopath_parquet
  split_seed: 7777
  val_fraction: 0.05
  mean:
  - 0.485
  - 0.456
  - 0.406
  std:
  - 0.229
  - 0.224
  - 0.225
  global_crop_scale:
  - 0.4
  - 1.0
  local_crop_scale:
  - 0.08
  - 0.35
  color_jitter: 0.3
  color_jitter_saturation: 0.25
  hed_jitter: 0.06
  tissue_thresh: 0.0
model:
  type: dinov2_vits14_reg
train:
  seed: 7777
  bf16: true
  activation_checkpointing: false
  batch_size: 128
  num_workers: 16
  prefetch_factor: 2
  persistent_workers: true
  max_train_samples: 1000000
  max_train_flops: 1000000000000000000
  log_every: 20
  save_every: 1000
  eval_every: 200
  val_batches: 16
  global_views: 2
  local_views: 8
  global_size: 224
  local_size: 112
  resume: null
dino:
  lr: 0.0001
  lr_min: 1.0e-06
  adam_beta2: 0.999
  warmup_fraction: 0.0909
  freeze_last_layer_fraction: 0.0091
  layerwise_decay: 0.7
  patch_embed_lr_mult: 0.2
  drop_path_rate: 0.1
  head_hidden_dim: 2048
  head_bottleneck_dim: 384
  clip_grad: 3.0
  kde_loss_weight: 0.005
  kde_concentration: 10.0
  jepa_pred_depth: 4
  jepa_pred_width: 0
  jepa_blocks: 4
  jepa_block_scale: 0.1
probe:
  enabled: true
  model_weights: ema
  count: 1
  datasets:
  - bracs
  - break_his
  - mhist
  - pcam
  segmentation_datasets:
  - pannuke
  - monusac
  - consep
  slide_datasets:
  - ucla_lung
  auc_datasets:
  - surgen
  survival_datasets:
  - leopard_bcr
  - cptac_pda_os
  robustness_datasets:
  - pathorob
  dataset_roots:
    bracs: /data/eva-data/bracs
    break_his: /data/eva-data/breakhis
    consep: /data/eva-data/consep
    cptac_pda_os: /data/CPTAC-PDA
    leopard_bcr: /data/leopard_bcr
    mhist: /data/eva-data/mhist
    monusac: /data/eva-data/monusac
    pcam: /data/eva-data/patch_camelyon
    pannuke: /data/thunder-data/pannuke
    pathorob: /data/pathorob
    surgen: /data/surgen
    ucla_lung: /data/ucla-lung
fino:
  enabled: true
  gamma_max: 0.5
  discrete:
  - - subtype
    - 1
  continuous:
  - - expr512
    - 1
  - - til
    - 1
